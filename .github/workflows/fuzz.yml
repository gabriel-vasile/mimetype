name: Fuzz
on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - name: Install Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        go-version: 'stable'
    # Cache interesting fuzzing inputs so subsequential fuzz runs
    # don't start from zero.
    - name: Locate fuzz cache
      run: echo "GOFUZZCACHE=$(go env GOCACHE)/fuzz" >> "$GITHUB_ENV"
    - name: Restore fuzz corpus
      uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ${{ env.GOFUZZCACHE }}
        # The key is unique per run so a fresh cache is always saved; restore-keys
        # falls back to the most recent corpus from a previous run.
        key: fuzz-${{ runner.os }}-${{ github.run_id }}
        restore-keys: |
          fuzz-${{ runner.os }}-
    # 2m is chosen so that half of the 2000 free CI minutes offered by Github
    # will be used each month. The other half is reserved for tests in PRs.
    # TODO: Find a way to select all fuzz tests, without listing them individually.
    - run: go test -fuzztime=2m -fuzz=Mimetype        ./
    - run: go test -fuzztime=2m -fuzz=Search          ./internal/scan
    - run: go test -fuzztime=2m -fuzz=Match           ./internal/scan
    - run: go test -fuzztime=2m -fuzz=Json            ./internal/json
    - run: go test -fuzztime=2m -fuzz=Parser          ./internal/csv
    - run: go test -fuzztime=2m -fuzz=Plain           ./internal/charset
    - run: go test -fuzztime=2m -fuzz=XML             ./internal/charset
    - run: go test -fuzztime=2m -fuzz=HTML            ./internal/charset
    - run: go test -fuzztime=2m -fuzz=Meta            ./internal/charset
    - run: go test -fuzztime=2m -fuzz=GetAnAttribute  ./internal/markup
    - run: go test -fuzztime=2m -fuzz=GetAValue       ./internal/markup
    - run: go test -fuzztime=2m -fuzz=ExtractFrame    ./internal/mp3
    - run: go test -fuzztime=2m -fuzz=Detect          ./internal/cdf

    - name: Save fuzz corpus
      if: always()
      uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ${{ env.GOFUZZCACHE }}
        key: fuzz-${{ runner.os }}-${{ github.run_id }}
