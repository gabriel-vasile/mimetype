name: Fuzz
on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: false
    - name: Install Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: 'stable'
    # Cache interesting fuzzing inputs so subsequential fuzz runs
    # don't start from zero.
    - name: Locate fuzz cache
      run: echo "GOFUZZCACHE=$(go env GOCACHE)/fuzz" >> "$GITHUB_ENV"
    - name: Restore fuzz corpus
      uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
      with:
        path: ${{ env.GOFUZZCACHE }}
        # The key is unique per run so a fresh cache is always saved; restore-keys
        # falls back to the most recent corpus from a previous run.
        key: fuzz-${{ runner.os }}-${{ github.run_id }}
        restore-keys: |
          fuzz-${{ runner.os }}-
    # 2m per target is chosen so that roughly half of the 2000 free CI minutes
    # offered by Github will be used each month. The other half is reserved for
    # tests in PRs. Keep an eye on the total run time when adding fuzz targets.
    - name: Run all fuzz tests
      run: |
        for pkg in $(go list ./...); do
          for target in $(go test -list '^Fuzz' "$pkg" | grep '^Fuzz' || true); do
            echo "=== fuzzing $target in $pkg ==="
            go test -fuzztime=2m -fuzz="^${target}\$" "$pkg"
          done
        done

    - name: Save fuzz corpus
      if: always()
      uses: actions/cache/save@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
      with:
        path: ${{ env.GOFUZZCACHE }}
        key: fuzz-${{ runner.os }}-${{ github.run_id }}
